<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DudeCopy Settings</title>
    <link rel="stylesheet" href="styles/common.css" />
  </head>
  <body>
    <main class="container grid">
      <section class="card grid">
        <h1>DudeCopy Settings</h1>
        <p>All data is stored in <code>chrome.storage.local</code> on this device.</p>
      </section>

      <section class="card grid">
        <div>
          <label for="maxHistory">Max history items</label>
          <input id="maxHistory" class="input" type="number" min="10" max="500" step="10" />
        </div>

        <div class="row">
          <button id="save" class="primary">Save Settings</button>
          <button id="clearHistory">Clear History</button>
        </div>

        <div id="status" class="status"></div>
      </section>
    </main>
    <script src="scripts/options.js"></script>
  </body>
</html>
